// Force Built-in Kotlin onto the file_picker plugin module.
//
// file_picker 11.x ships Kotlin sources but deliberately skips applying the
// Kotlin Gradle Plugin on AGP 9 (its build.gradle guards with
// `isAgp9OrAbove`), so its `FilePickerPlugin.kt` is never compiled and the app
// fails with "cannot find symbol class FilePickerPlugin".
//
// Applied as a Gradle init script (Gradle auto-loads everything under
// ~/.gradle/init.d/), this hook runs while each project is being *configured*
// — before the flutter-plugin-loader finishes evaluating file_picker — so the
// Kotlin plugin is applied in time and the symbol resolves.
allprojects { project ->
    if (project.name == "file_picker" && !project.plugins.hasPlugin("org.jetbrains.kotlin.android")) {
        project.plugins.apply("org.jetbrains.kotlin.android")
    }
}
