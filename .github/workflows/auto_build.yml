name: Auto Build (All Platforms)

# Auto-build on every push to main (and manual dispatch): builds Android
# (release-signed with the upload key from GitHub Secrets), Windows, and Web,
# and uploads each as a downloadable artifact. This gives a full multi-platform
# build one push away — no tag required. (Tagged releases still use
# build_release.yml, which also publishes a GitHub Release.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Android APK — release-signed with the upload key
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK (signed)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode signing keystore & write key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          printf '%s\n' "$KEY_PROPERTIES" > android/key.properties
          echo "keystore bytes: $(wc -c < android/app/upload-keystore.jks)"

      - name: Build signed APK
        run: flutter build apk --release --split-per-abi

      - name: Verify APK is signed
        run: |
          for f in build/app/outputs/flutter-apk/*.apk; do
            echo "Verifying $f"
            unzip -p "$f" META-INF/*.RSA >/dev/null 2>&1 && echo "  signed ✓" || echo "  NOT signed ✗"
          done

      - name: Upload signed APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/*.apk

  # ─────────────────────────────────────────────
  # Windows — built automatically (code-signing would need a separate
  # Authenticode certificate; the Android upload key does not apply here)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Archive Windows build
        run: |
          cd build/windows/x64/runner/Release
          7z a -tzip ${{ github.workspace }}/free-note-windows.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: free-note-windows.zip

  # ─────────────────────────────────────────────
  # Web
  # ─────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Archive Web build
        run: cd build/web && zip -r ${{ github.workspace }}/free-note-web.zip .

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: free-note-web.zip
