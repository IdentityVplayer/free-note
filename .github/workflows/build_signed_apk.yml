name: Build Signed APK

# Auto-sign: every push to main (and manual dispatch) produces a release-signed
# APK using the upload key stored in GitHub Secrets. The APK is uploaded as a
# build artifact so a signed build is always one push away.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    name: Build Signed Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode signing keystore & write key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          printf '%s\n' "$KEY_PROPERTIES" > android/key.properties
          echo "keystore bytes: $(wc -c < android/app/upload-keystore.jks)"

      - name: Build signed APK
        run: flutter build apk --release --split-per-abi

      - name: Verify APK is signed
        run: |
          for f in build/app/outputs/flutter-apk/*.apk; do
            echo "Verifying $f"
            unzip -p "$f" META-INF/*.RSA >/dev/null 2>&1 && echo "  signed ✓" || echo "  NOT signed ✗"
          done

      - name: Upload signed APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-android-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
