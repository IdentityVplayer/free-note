name: free_note
description: "Free Note - A multifunctional cross-platform note-taking app with Markdown, Plugins, AI, GitHub Sync, i18n and Dark Mode."
publish_to: 'none'
version: 1.8.1+16

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Markdown & HTML rendering
  flutter_markdown: ^0.7.0
  markdown: ^7.1.0
  flutter_html: ^3.0.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0
  file_picker: ^11.0.0
  yaml: ^3.1.2

  # Storage permissions (folder access on Android)
  permission_handler: ^11.3.1

  # HTTP & AI
  http: ^1.2.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Utils
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - lib/l10n/
